# ~/.config/alacritty/alacritty.toml

[font]
size = 14.0

[font.normal]
# family = "OperatorMono Nerd Font"
family = "MonoLisaVariable Nerd Font"

[colors]
# Gruvbox Dark theme
# Alacritty doesn't have built-in named schemes — colors must be defined manually.
# Below is the Gruvbox Dark palette:

[colors.primary]
background = "#282828"
foreground = "#ebdbb2"

[colors.normal]
black   = "#282828"
red     = "#cc241d"
green   = "#98971a"
yellow  = "#d79921"
blue    = "#458588"
magenta = "#b16286"
cyan    = "#689d6a"
white   = "#a89984"

[colors.bright]
black   = "#928374"
red     = "#fb4934"
green   = "#b8bb26"
yellow  = "#fabd2f"
blue    = "#83a598"
magenta = "#d3869b"
cyan    = "#8ec07c"
white   = "#ebdbb2"

[window]
decorations = "full"
option_as_alt = "OnlyRight"
decorations_theme_variant = "Dark"

# Hide tab bar equivalent — Alacritty has no tabs natively, so nothing needed here.

[keyboard]
bindings = [
  { key = "Return", mods = "Shift", chars = "\u001b[200~\n\u001b[201~" },
]
